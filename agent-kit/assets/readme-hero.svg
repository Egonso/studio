<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KI-Register Agent Kit</title>
  <desc id="desc">Minimal monochrome hero graphic for the KI-Register Agent Kit.</desc>

  <rect width="1200" height="640" fill="#F5F5F2"/>
  <rect x="28" y="28" width="1144" height="584" rx="28" fill="#FCFCFA" stroke="#111111" stroke-width="2"/>

  <rect x="86" y="82" width="124" height="32" rx="16" fill="#111111"/>
  <text x="148" y="103" text-anchor="middle" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Documentation Standard</text>

  <text x="86" y="180" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">
    KI-Register Agent Kit
  </text>
  <text x="86" y="224" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="24">
    A calm, auditable operating layer for documenting AI systems,
  </text>
  <text x="86" y="258" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="24">
    workflows and processes across different agent environments.
  </text>

  <line x1="86" y1="310" x2="528" y2="310" stroke="#111111" stroke-width="2"/>

  <text x="86" y="362" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Onboard once</text>
  <text x="86" y="392" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">Save defaults, role and output path.</text>

  <text x="86" y="448" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Capture during work</text>
  <text x="86" y="478" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">Generate documentation next to implementation.</text>

  <text x="86" y="534" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Confirm before write</text>
  <text x="86" y="564" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">Human review remains explicit by default.</text>

  <rect x="642" y="104" width="468" height="432" rx="26" fill="#111111"/>
  <rect x="676" y="138" width="400" height="52" rx="14" fill="#FAFAF7"/>
  <text x="876" y="171" text-anchor="middle" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Generated workflow folder</text>

  <rect x="676" y="220" width="400" height="250" rx="18" fill="#171717" stroke="#F5F5F2"/>
  <text x="712" y="264" fill="#E5E5E5" font-family="Courier New, monospace" font-size="21">docs/agent-workflows/</text>
  <text x="736" y="304" fill="#FFFFFF" font-family="Courier New, monospace" font-size="21">customer-support-assistant/</text>
  <text x="768" y="348" fill="#F5F5F5" font-family="Courier New, monospace" font-size="19">README.md</text>
  <text x="768" y="382" fill="#D4D4D4" font-family="Courier New, monospace" font-size="19">manifest.json</text>
  <text x="768" y="416" fill="#A3A3A3" font-family="Courier New, monospace" font-size="19">review notes</text>

  <line x1="676" y1="500" x2="1076" y2="500" stroke="#F5F5F2" stroke-width="1.5"/>
  <text x="676" y="528" fill="#E5E5E5" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Reviewable for humans. Structured for agents. Calm enough for governance.
  </text>
</svg>
