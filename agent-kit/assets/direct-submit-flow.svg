<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Direct submission flow for KI-Register Agent Kit</title>
  <desc id="desc">Four-step visual showing API key creation, agent capture, CLI submit, and visible KI-Register result for team leads.</desc>

  <rect width="1400" height="860" fill="#F3F3EF"/>
  <rect x="32" y="32" width="1336" height="796" rx="28" fill="#FCFCFA" stroke="#111111" stroke-width="2"/>

  <rect x="88" y="88" width="232" height="36" rx="18" fill="#111111"/>
  <text x="204" y="112" text-anchor="middle" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">
    Direct Register Intake
  </text>

  <text x="88" y="176" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">
    From agent workflow to
  </text>
  <text x="88" y="228" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">
    visible KI-Register card
  </text>
  <text x="88" y="276" fill="#404040" font-family="Arial, Helvetica, sans-serif" font-size="24">
    Technical teams set up the handoff once. Team leads only review the final result.
  </text>

  <line x1="88" y1="314" x2="1312" y2="314" stroke="#111111" stroke-width="2"/>

  <rect x="88" y="368" width="284" height="404" rx="24" fill="#F3F3EF" stroke="#111111" stroke-width="1.5"/>
  <text x="120" y="414" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">
    1 CREATE KEY
  </text>
  <text x="120" y="462" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Generate a personal
  </text>
  <text x="120" y="498" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Agent Kit API key
  </text>
  <rect x="120" y="532" width="220" height="140" rx="18" fill="#FCFCFA" stroke="#111111" stroke-width="1.2"/>
  <text x="142" y="568" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    Workspace Control
  </text>
  <text x="142" y="602" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Agent Kit API Keys
  </text>
  <text x="142" y="632" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Label + register + create
  </text>
  <text x="142" y="662" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    One key per person
  </text>
  <text x="120" y="718" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Owners and admins can
  </text>
  <text x="120" y="746" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    revoke keys centrally later.
  </text>

  <rect x="404" y="368" width="284" height="404" rx="24" fill="#F3F3EF" stroke="#111111" stroke-width="1.5"/>
  <text x="436" y="414" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">
    2 CAPTURE
  </text>
  <text x="436" y="462" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Let the agent document
  </text>
  <text x="436" y="498" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    and confirm first
  </text>
  <rect x="436" y="532" width="220" height="140" rx="18" fill="#FCFCFA" stroke="#111111" stroke-width="1.2"/>
  <text x="458" y="568" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    node ./bin/studio-agent
  </text>
  <text x="458" y="602" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    capture
  </text>
  <text x="458" y="632" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    interview
  </text>
  <text x="458" y="662" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    confirm before write
  </text>
  <text x="436" y="718" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    README.md plus manifest.json
  </text>
  <text x="436" y="746" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    stay readable and portable.
  </text>

  <rect x="720" y="368" width="284" height="404" rx="24" fill="#111111"/>
  <text x="752" y="414" fill="#D4D4D4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">
    3 SUBMIT
  </text>
  <text x="752" y="456" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Send the
  </text>
  <text x="752" y="488" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    confirmed manifest
  </text>
  <text x="752" y="520" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    to KI-Register
  </text>
  <rect x="752" y="550" width="220" height="122" rx="18" fill="#1B1B1B" stroke="#FAFAF7" stroke-width="1.2"/>
  <text x="774" y="584" fill="#FAFAF7" font-family="Courier New, monospace" font-size="16">
    export KI_REGISTER_API_KEY
  </text>
  <text x="774" y="616" fill="#D4D4D4" font-family="Courier New, monospace" font-size="16">
    export KI_REGISTER_REGISTER_ID
  </text>
  <text x="774" y="648" fill="#D4D4D4" font-family="Courier New, monospace" font-size="16">
    studio-agent submit
  </text>
  <text x="774" y="718" fill="#D4D4D4" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Uses the workspace-scoped
  </text>
  <text x="774" y="746" fill="#D4D4D4" font-family="Arial, Helvetica, sans-serif" font-size="18">
    API endpoint and register id.
  </text>

  <rect x="1036" y="368" width="276" height="404" rx="24" fill="#F3F3EF" stroke="#111111" stroke-width="1.5"/>
  <text x="1068" y="414" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">
    4 RESULT
  </text>
  <text x="1068" y="462" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    Team lead sees the
  </text>
  <text x="1068" y="498" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">
    case on the website
  </text>
  <rect x="1068" y="532" width="212" height="140" rx="18" fill="#FCFCFA" stroke="#111111" stroke-width="1.2"/>
  <text x="1090" y="568" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">
    KI-Register
  </text>
  <text x="1090" y="602" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    New use case visible
  </text>
  <text x="1090" y="632" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    Reviewable in workspace
  </text>
  <text x="1090" y="662" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">
    No file handling required
  </text>
  <text x="1068" y="718" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    The register entry is the
  </text>
  <text x="1068" y="746" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="18">
    review surface for the team.
  </text>

  <path d="M372 568H404" stroke="#111111" stroke-width="2"/>
  <path d="M688 568H720" stroke="#111111" stroke-width="2"/>
  <path d="M1004 568H1036" stroke="#111111" stroke-width="2"/>
</svg>
