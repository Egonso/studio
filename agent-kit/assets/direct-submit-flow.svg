<svg width="960" height="280" viewBox="0 0 960 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Direct submission flow</title>
  <desc id="desc">A linear flow from agent capture to KI-Register review.</desc>
  <rect width="960" height="280" fill="#F8FAFC"/>
  <rect x="32" y="48" width="176" height="184" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="2"/>
  <rect x="264" y="48" width="176" height="184" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="496" y="48" width="176" height="184" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="728" y="48" width="200" height="184" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="2"/>
  <path d="M220 140H252" stroke="#0F172A" stroke-width="2"/>
  <path d="M244 132L252 140L244 148" stroke="#0F172A" stroke-width="2"/>
  <path d="M452 140H484" stroke="#0F172A" stroke-width="2"/>
  <path d="M476 132L484 140L476 148" stroke="#0F172A" stroke-width="2"/>
  <path d="M684 140H716" stroke="#0F172A" stroke-width="2"/>
  <path d="M708 132L716 140L708 148" stroke="#0F172A" stroke-width="2"/>
  <text x="64" y="92" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">1. Capture</text>
  <text x="64" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="14">Inspect files or</text>
  <text x="64" y="148" fill="#475569" font-family="Arial, sans-serif" font-size="14">interview the user.</text>
  <text x="296" y="92" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">2. Validate</text>
  <text x="296" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="14">Create README.md</text>
  <text x="296" y="148" fill="#475569" font-family="Arial, sans-serif" font-size="14">and manifest.json.</text>
  <text x="528" y="92" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">3. Confirm</text>
  <text x="528" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="14">Human review before</text>
  <text x="528" y="148" fill="#475569" font-family="Arial, sans-serif" font-size="14">files or API submit.</text>
  <text x="760" y="92" fill="#0F172A" font-family="Arial, sans-serif" font-size="18" font-weight="700">4. KI-Register</text>
  <text x="760" y="126" fill="#475569" font-family="Arial, sans-serif" font-size="14">Submit to the API and</text>
  <text x="760" y="148" fill="#475569" font-family="Arial, sans-serif" font-size="14">review on the website.</text>
  <rect x="64" y="178" width="112" height="28" rx="4" fill="#E2E8F0"/>
  <rect x="296" y="178" width="112" height="28" rx="4" fill="#DBEAFE"/>
  <rect x="528" y="178" width="112" height="28" rx="4" fill="#DCFCE7"/>
  <rect x="760" y="178" width="128" height="28" rx="4" fill="#E2E8F0"/>
  <text x="84" y="197" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">evidence</text>
  <text x="316" y="197" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">schema</text>
  <text x="548" y="197" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">approval</text>
  <text x="780" y="197" fill="#0F172A" font-family="Arial, sans-serif" font-size="12" font-weight="700">use case card</text>
</svg>
