<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Documentation lifecycle</title>
  <desc id="desc">Minimal monochrome flow diagram for the operating model.</desc>

  <rect width="1200" height="420" fill="#F5F5F2"/>
  <rect x="28" y="28" width="1144" height="364" rx="28" fill="#FCFCFA" stroke="#111111" stroke-width="2"/>

  <text x="68" y="88" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Recommended operating flow</text>
  <text x="68" y="122" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="20">
    One quiet system: onboard, capture, confirm, write, review.
  </text>

  <rect x="70" y="180" width="184" height="134" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <rect x="290" y="180" width="184" height="134" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <rect x="510" y="180" width="184" height="134" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <rect x="730" y="180" width="184" height="134" rx="24" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <rect x="950" y="180" width="184" height="134" rx="24" fill="#111111"/>

  <text x="92" y="214" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">01</text>
  <text x="92" y="248" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Onboard</text>
  <text x="92" y="278" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">Profile, defaults,</text>
  <text x="92" y="300" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">output path.</text>

  <text x="312" y="214" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">02</text>
  <text x="312" y="248" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Capture</text>
  <text x="312" y="278" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">Document while</text>
  <text x="312" y="300" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">the work is live.</text>

  <text x="532" y="214" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">03</text>
  <text x="532" y="248" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Confirm</text>
  <text x="532" y="278" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">Keep human</text>
  <text x="532" y="300" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">review explicit.</text>

  <text x="752" y="214" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">04</text>
  <text x="752" y="248" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Write</text>
  <text x="752" y="278" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">Generate README</text>
  <text x="752" y="300" fill="#525252" font-family="Arial, Helvetica, sans-serif" font-size="16">and manifest.</text>

  <text x="972" y="214" fill="#A3A3A3" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">05</text>
  <text x="972" y="248" fill="#FAFAF7" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Review</text>
  <text x="972" y="278" fill="#E5E5E5" font-family="Arial, Helvetica, sans-serif" font-size="16">Validate, commit,</text>
  <text x="972" y="300" fill="#E5E5E5" font-family="Arial, Helvetica, sans-serif" font-size="16">audit later.</text>

  <line x1="254" y1="247" x2="290" y2="247" stroke="#111111" stroke-width="2"/>
  <line x1="474" y1="247" x2="510" y2="247" stroke="#111111" stroke-width="2"/>
  <line x1="694" y1="247" x2="730" y2="247" stroke="#111111" stroke-width="2"/>
  <line x1="914" y1="247" x2="950" y2="247" stroke="#111111" stroke-width="2"/>
</svg>
