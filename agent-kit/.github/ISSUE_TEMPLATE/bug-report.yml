name: Bug report
description: Report a problem in the CLI, skill package, docs, or generated outputs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting this. Please include enough detail to reproduce the problem safely.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, operating system, and agent runtime if relevant
      placeholder: node 20.x on macOS, Codex desktop
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Exact command that was run
      placeholder: node ./bin/studio-agent.mjs capture --title "..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant manifest snippets, marketplace context, or screenshots if safe
