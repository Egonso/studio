<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Capture Konfiguration</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
      }
      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 20px;
      }
      p {
        margin-top: 0;
        color: #475569;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
      }
      .row {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        border-color: #0f172a;
        background: #0f172a;
        color: #fff;
      }
      #status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 13px;
        color: #334155;
      }
      #status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>KI-Register Quick Capture</h1>
      <p>
        Hier kannst du die Basis-URL konfigurieren, die fuer das Quick-Capture-Fenster verwendet wird.
      </p>

      <label for="baseUrl">Basis-URL</label>
      <input id="baseUrl" type="url" placeholder="https://app.eukigesetz.com" />
      <p class="hint">
        Beispiele: <code>https://app.eukigesetz.com</code> oder <code>http://localhost:3000</code>
      </p>

      <div class="row">
        <button id="save" class="primary">Speichern</button>
        <button id="open-test">Test: Quick Capture oeffnen</button>
      </div>

      <p id="status"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
