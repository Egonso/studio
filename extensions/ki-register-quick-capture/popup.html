<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KI-Register Quick Capture</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <img src="icons/icon48.png" alt="" width="24" height="24" />
        <div>
          <h1>Quick Capture</h1>
          <p>KI-Einsatzfall jederzeit erfassen</p>
        </div>
      </header>

      <section class="card">
        <p class="label">Ziel-URL</p>
        <p id="base-url" class="value">Lade ...</p>
      </section>

      <section class="actions">
        <button id="open-window" class="button button-primary">Im Mini-Fenster oeffnen</button>
        <button id="open-tab" class="button">Im Tab oeffnen</button>
      </section>

      <section class="footer">
        <button id="open-options" class="link-button">URL konfigurieren</button>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
