<svg width="1180" height="760" viewBox="0 0 1180 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Projektansicht im KI Register</title>
  <desc id="desc">Screenshotartige Vorschau eines dokumentierten KI-Einsatzfalls im KI Register mit Zweck, Risikoklasse, Verantwortlichkeit und Nachweisstatus.</desc>
  <rect width="1180" height="760" fill="#f8fafc"/>
  <rect x="54" y="46" width="1072" height="668" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="54" y="46" width="1072" height="64" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="86" y="86" fill="#020617" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">KI Register</text>
  <text x="936" y="86" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Projekt 01</text>

  <text x="86" y="158" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.5">ERSTER KI-EINSATZFALL</text>
  <text x="86" y="198" fill="#020617" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Kundenservice-Chatbot mit Wissensdatenbank</text>
  <text x="86" y="232" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Ein begrenzter Organisationskontext wird aus dem Kurs heraus als Nachweisobjekt geführt.</text>

  <g transform="translate(86 280)">
    <rect x="0" y="0" width="216" height="112" fill="#f8fafc" stroke="#cbd5e1"/>
