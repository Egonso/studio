# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

env:
  - variable: PERPLEXITY_API_KEY
    secret: PERPLEXITY_API_KEY
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: EMAILIT_API_KEY
    secret: EMAILIT_API_KEY
  - variable: EMAILIT_FROM_EMAIL
    secret: EMAILIT_FROM_EMAIL
  - variable: EMAILIT_SUPPLIER_INVITE_TEMPLATE
    secret: EMAILIT_SUPPLIER_INVITE_TEMPLATE
  - variable: EMAILIT_SUPPLIER_OTP_TEMPLATE
    secret: EMAILIT_SUPPLIER_OTP_TEMPLATE
  - variable: EMAILIT_SUPPLIER_CONFIRMATION_TEMPLATE
    secret: EMAILIT_SUPPLIER_CONFIRMATION_TEMPLATE
  - variable: SUPPLIER_SESSION_SECRET
    secret: SUPPLIER_SESSION_SECRET
  - variable: NEXT_PUBLIC_REGISTER_FIRST_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_REGISTER_FIRST_HYBRID_ENTRY
    value: "true"
  - variable: NEXT_PUBLIC_REGISTER_FIRST_STICKY_LAUNCHER
    value: "true"
  - variable: NEXT_PUBLIC_REGISTER_FIRST_PROOF_GATE
    value: "true"
  - variable: NEXT_PUBLIC_REGISTER_FIRST_STANDALONE
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_SHELL_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_KPI_HEADER_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_MATURITY_MODEL_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_ACTION_QUEUE_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_PORTFOLIO_INTELLIGENCE_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_ISO_AUDIT_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_POLICY_ENGINE_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_ORG_EXPORT_CENTER_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_UPGRADE_TRIGGERS_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_CONTROL_ANALYTICS_ENABLED
    value: "true"
  - variable: NEXT_PUBLIC_SUPPLIER_INVITE_V2_ENABLED
    value: "true"
