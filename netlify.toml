[build]
command = "npm run build"
publish = ".next"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[redirects]]
from = "https://app.kiregister.com/*"
to = "https://kiregister.com/:splat"
status = 301
force = true

[build.environment]
NODE_VERSION = "20"
NEXT_PUBLIC_APP_ORIGIN = "https://kiregister.com"
NEXT_PUBLIC_REGISTER_FIRST_RISK_ASSIST_DETAIL = "true"
NEXT_PUBLIC_CONTROL_SHELL_ENABLED = "true"
NEXT_PUBLIC_CONTROL_KPI_HEADER_ENABLED = "true"
NEXT_PUBLIC_CONTROL_MATURITY_MODEL_ENABLED = "true"
NEXT_PUBLIC_CONTROL_ACTION_QUEUE_ENABLED = "true"
NEXT_PUBLIC_CONTROL_PORTFOLIO_INTELLIGENCE_ENABLED = "true"
NEXT_PUBLIC_CONTROL_ISO_AUDIT_ENABLED = "true"
NEXT_PUBLIC_CONTROL_POLICY_ENGINE_ENABLED = "true"
NEXT_PUBLIC_CONTROL_ORG_EXPORT_CENTER_ENABLED = "true"
NEXT_PUBLIC_CONTROL_UPGRADE_TRIGGERS_ENABLED = "true"
NEXT_PUBLIC_CONTROL_ANALYTICS_ENABLED = "true"
